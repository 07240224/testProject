name: Build AutoClicker APK

on:
  push:
    branches:
      - build-autoclicker-apk-20260724

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4

      - name: Reassemble source archive
        shell: bash
        run: |
          cat autoclicker-source.part* | base64 -d > autoclicker-source.zip
          unzip -t autoclicker-source.zip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Extract project
        run: unzip -q autoclicker-source.zip -d project

      - name: Build APK
        working-directory: project/AutoClicker
        run: gradle --no-daemon :app:assembleDebug

      - name: Prepare APK
        shell: bash
        run: |
          cp project/AutoClicker/app/build/outputs/apk/debug/app-debug.apk AutoClicker-v1.0.apk
          sha256sum AutoClicker-v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-APK
          path: AutoClicker-v1.0.apk
          if-no-files-found: error
          retention-days: 1
