name: Build AutoClicker APK (temporary)

on:
  push:
    paths:
      - '.github/workflows/build-autoclicker-issue.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout temporary build branch
        uses: actions/checkout@v4
        with:
          ref: build-autoclicker-apk-20260724
          fetch-depth: 0

      - name: Reassemble source archive
        shell: bash
        run: |
          cat autoclicker-source.part* | base64 -d > autoclicker-source.zip
          unzip -t autoclicker-source.zip
          unzip -q autoclicker-source.zip -d project

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build APK
        working-directory: project/AutoClicker
        run: gradle --no-daemon :app:assembleDebug

      - name: Store APK on temporary branch
        shell: bash
        run: |
          cp project/AutoClicker/app/build/outputs/apk/debug/app-debug.apk AutoClicker-v1.0.apk
          sha256sum AutoClicker-v1.0.apk > AutoClicker-v1.0.sha256
          base64 -w0 AutoClicker-v1.0.apk > AutoClicker-v1.0.apk.b64
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AutoClicker-v1.0.apk.b64 AutoClicker-v1.0.sha256
          git commit -m "Store built AutoClicker APK"
          git push origin HEAD:build-autoclicker-apk-20260724
