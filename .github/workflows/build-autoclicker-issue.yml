name: Build AutoClicker APK (temporary)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.event.pull_request.title == 'Build AutoClicker APK 20260724' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout temporary build branch
        uses: actions/checkout@v4
        with:
          ref: build-autoclicker-apk-20260724
          fetch-depth: 0

      - name: Reassemble source archive
        shell: bash
        run: |
          sed 's/ZBOI/ZbOI/' autoclicker-source.part01 > /tmp/autoclicker-source.part01
          cat autoclicker-source.part00 /tmp/autoclicker-source.part01 autoclicker-source.part02 autoclicker-source.part03 autoclicker-source.part04 | base64 -d > autoclicker-source.zip
          sha256sum autoclicker-source.zip
          unzip -t autoclicker-source.zip
          unzip -q autoclicker-source.zip -d project

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build APK
        working-directory: project/AutoClicker
        run: gradle --no-daemon :app:assembleDebug

      - name: Prepare APK
        shell: bash
        run: |
          cp project/AutoClicker/app/build/outputs/apk/debug/app-debug.apk AutoClicker-v1.0.apk
          sha256sum AutoClicker-v1.0.apk | tee AutoClicker-v1.0.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-APK
          path: |
            AutoClicker-v1.0.apk
            AutoClicker-v1.0.sha256
          if-no-files-found: error
          retention-days: 1
